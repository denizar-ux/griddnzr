<title>Grid.ig</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e8e3dc;
    --text: #1a1814;
    --text2: #7a7469;
    --text3: #b0a99f;
    --accent: #c9a96e;
    --accent2: #8b6b3d;
    --danger: #c0392b;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg: #131210;
    --surface: #1e1c19;
    --surface2: #252320;
    --border: #2e2b27;
    --text: #f0ece6;
    --text2: #9a9086;
    --text3: #5a5550;
    --accent: #c9a96e;
    --accent2: #e8c88a;
    --shadow: 0 2px 16px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    transition: background var(--transition), color var(--transition);
    overflow: hidden;
  }

  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* HEADER */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500;
    letter-spacing: 0.02em; line-height: 1;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .header-right { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2);
    cursor: pointer; font-size: 15px;
    transition: all var(--transition);
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }

  .user-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; cursor: pointer;
    font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    transition: all var(--transition);
  }
  .user-pill:hover { border-color: var(--accent); }
  .user-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
  }

  /* MODE BAR */
  .mode-bar {
    flex-shrink: 0;
    display: flex; gap: 4px; align-items: center;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .mode-bar::-webkit-scrollbar { display: none; }
  .mode-btn {
    padding: 5px 13px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; white-space: nowrap;
    transition: all var(--transition);
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mode-bar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
  .photo-count {
    margin-left: auto; flex-shrink: 0;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--text3); font-family: 'Cormorant Garamond', serif;
    white-space: nowrap;
  }

  /* MAIN */
  main {
    flex: 1; overflow-y: auto;
    padding: 14px 14px 90px;
    -webkit-overflow-scrolling: touch;
  }
  main::-webkit-scrollbar { width: 3px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* GRID */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* CELL */
  .grid-cell {
    position: relative;
    aspect-ratio: 3/4;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    touch-action: none;
    user-select: none;
  }
  .grid-cell:hover { border-color: var(--accent); z-index: 2; }



  /* filled cell */
  .cell-img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  .cell-overlay {
    position: absolute; inset: 0; opacity: 0;
    transition: opacity var(--transition);
    background: rgba(0,0,0,0.38);
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 6px; gap: 5px;
  }
  .grid-cell.has-img:hover .cell-overlay { opacity: 1; }
  .cell-btn {
    width: 26px; height: 26px; border-radius: 6px; border: none;
    background: rgba(255,255,255,0.18); backdrop-filter: blur(4px);
    color: #fff; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; pointer-events: auto;
  }
  .cell-btn:hover { background: rgba(255,255,255,0.32); }
  .cell-btn.del:hover { background: rgba(192,57,43,0.85); }
  .cell-pos {
    position: absolute; top: 5px; left: 5px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 9px; font-weight: 500;
    color: rgba(255,255,255,0.85); background: rgba(0,0,0,0.3);
    padding: 1px 4px; border-radius: 3px;
    pointer-events: none; opacity: 0; transition: opacity var(--transition);
  }
  .grid-cell.has-img:hover .cell-pos { opacity: 1; }

  /* drag states */
  .grid-cell.dragging { opacity: 0.35; transform: scale(0.94); }
  .grid-cell.drag-over { border-color: var(--accent); transform: scale(1.025); background: rgba(201,169,110,0.07); }
  .grid-cell.swap-source { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  @keyframes pulse-g {
    0%,100% { box-shadow: 0 0 0 2px #22c55e; }
    50% { box-shadow: 0 0 0 5px rgba(34,197,94,0.25); }
  }
  .grid-cell.swap-target { border-color: #22c55e; animation: pulse-g 0.85s infinite; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 20;
  }
  .btn-upload {
    width: 100%; padding: 13px;
    border-radius: 12px; border: none;
    background: var(--accent); color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background var(--transition), transform 0.1s;
  }
  .btn-upload:active { transform: scale(0.98); }
  .btn-upload:hover { background: var(--accent2); }

  /* SWAP HINT */
  .swap-hint {
    text-align: center; margin-top: 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    color: var(--accent); min-height: 16px;
    max-width: 480px; margin-left: auto; margin-right: auto;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.48); backdrop-filter: blur(7px);
    z-index: 100; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity var(--transition);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    width: 100%; background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 88dvh; overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-header {
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; }
  .modal-close {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: var(--surface2); color: var(--text2);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 14px 18px; }

  .user-list { display: flex; flex-direction: column; gap: 8px; }
  .user-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 13px; border-radius: 10px;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: all var(--transition);
  }
  .user-item:hover { border-color: var(--accent); }
  .user-item.active { border-color: var(--accent); background: rgba(201,169,110,0.07); }
  .user-item-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  }
  .user-item-info { flex: 1; min-width: 0; }
  .user-item-name { font-weight: 600; font-size: 14px; }
  .user-item-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .user-item-check { color: var(--accent); font-size: 15px; flex-shrink: 0; }

  .add-user-form { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
  .form-label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; display: block; }
  .input-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1; padding: 10px 13px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; transition: border-color var(--transition);
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .btn-sm {
    padding: 10px 15px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; white-space: nowrap;
    transition: background var(--transition);
  }
  .btn-sm:hover { background: var(--accent2); }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); }

  .toast {
    position: fixed; bottom: 86px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--text); color: var(--bg);
    padding: 9px 18px; border-radius: 20px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    opacity: 0; transition: all 0.22s; z-index: 999;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #file-input { display: none; }

  /* SYNC DOT */
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; flex-shrink: 0;
    transition: background 0.4s;
  }
  /* upload progress bar inside cell */
  .cell-uploading { position: relative; }
  .cell-uploading::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.4); border-radius: 3px; z-index: 3;
  }
  .cell-prog {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: rgba(255,255,255,0.2); z-index: 4;
    border-radius: 0 0 3px 3px; overflow: hidden;
  }
  .cell-prog-bar {
    height: 100%; background: var(--accent);
    transition: width 0.15s; width: 0%;
  }

</style>
</head>

<script>

// ══════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════
var SUPA_URL  = 'https://njwsdlvxbapidqrcuoks.supabase.co';
var SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qd3NkbHZ4YmFwaWRxcmN1b2tzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzkwODksImV4cCI6MjA5MTc1NTA4OX0.GlTYRdX6rpTXClLJC1Zs3rAXFnGh4VYsIy3zDyPyw64';
var BUCKET    = 'grid-ig';
var supa      = null;  // supabase client, set after SDK loads

// ══════════════════════════════════════
// SDK LOADER
// ══════════════════════════════════════
var _supaReady = false;
var _supaQueue = [];

function onSupaReady(cb) {
  if (_supaReady) { cb(); return; }
  _supaQueue.push(cb);
}

function _loadScript(src, cb, errCb) {
  var s = document.createElement('script');
  s.src = src; s.onload = cb;
  s.onerror = errCb || function(){};
  document.head.appendChild(s);
}

_loadScript(
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
  function() {
    supa = supabase.createClient(SUPA_URL, SUPA_ANON);
    _supaReady = true;
    _supaQueue.forEach(function(cb){ try{cb();}catch(e){console.error(e);} });
    _supaQueue = [];
    syncDot('idle');
    initSupabaseSync();
  },
  function() {
    console.warn('Supabase SDK gagal load — offline mode');
    syncDot('error');
  }
);

// ══════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════
var COLS   = 3;
var COLORS = ['#c9a96e','#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#1abc9c','#e91e63'];
var _saveTimer  = null;
var _realtimeCh = null;  // supabase realtime channel

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
var state = {
  theme: 'light',
  mode: 'rearrange',
  currentUser: null,
  users: [],       // [{id, name, color, images:[url,...]}]
  swapSource: null,
  selectedColor: COLORS[0]
};

// ══════════════════════════════════════
// SYNC INDICATOR
// ══════════════════════════════════════
function syncDot(status) {
  var el = document.getElementById('sync-dot');
  if (!el) return;
  var map = { idle:'#22c55e', syncing:'#f59e0b', error:'#ef4444' };
  el.style.background = map[status] || '#22c55e';
  el.title = status === 'idle' ? 'Synced' : status === 'syncing' ? 'Syncing…' : 'Sync error';
}

// ══════════════════════════════════════
// LOCAL PERSISTENCE
// ══════════════════════════════════════
var LS = {
  save: function() {
    try {
      var lite = state.users.map(function(u){ return {id:u.id,name:u.name,color:u.color}; });
      localStorage.setItem('gig_sb_users', JSON.stringify(lite));
      localStorage.setItem('gig_sb_cur',   state.currentUser||'');
      localStorage.setItem('gig_sb_theme', state.theme);
    } catch(e) {}
  },
  saveImgs: function(userId, imgs) {
    try { localStorage.setItem('gig_sb_imgs_'+userId, JSON.stringify(imgs)); } catch(e) {}
  },
  load: function() {
    try {
      var t = localStorage.getItem('gig_sb_theme'); if (t) state.theme = t;
      var raw = JSON.parse(localStorage.getItem('gig_sb_users')||'[]');
      state.users = raw.map(function(u) {
        var imgs = [];
        try { imgs = JSON.parse(localStorage.getItem('gig_sb_imgs_'+u.id)||'[]'); } catch(e) {}
        return {id:u.id, name:u.name, color:u.color, images:imgs};
      });
      var c = localStorage.getItem('gig_sb_cur');
      if (c && state.users.find(function(u){ return u.id===c; })) state.currentUser = c;
      else if (state.users.length) state.currentUser = state.users[0].id;
      if (!state.users.length) initDefault();
    } catch(e) { initDefault(); }
  }
};

function initDefault() {
  LS.save();
}

function makeUser(name) {
  var id = 'u'+Date.now()+Math.random().toString(36).slice(2,5);
  var u = {id:id, name:name.replace('@',''), color:state.selectedColor||COLORS[0], images:[]};
  state.users.push(u);
  return u;
}

function cur() { return state.users.find(function(u){ return u.id===state.currentUser; })||null; }

// ══════════════════════════════════════
// SUPABASE DB  — table: grid_users
// Schema:
//   id        text PRIMARY KEY   (userId)
//   name      text
//   color     text
//   images    jsonb              (array of URLs)
//   updated_at timestamptz default now()
// ══════════════════════════════════════
function dbSaveUser(u) {
  onSupaReady(function() {
    syncDot('syncing');
    if (_saveTimer) clearTimeout(_saveTimer);
    _saveTimer = setTimeout(function() {
      supa.from('grid_users')
        .upsert({ id:u.id, name:u.name, color:u.color, images:u.images },
                { onConflict:'id' })
        .then(function(res) {
          if (res.error) { syncDot('error'); console.error(res.error); }
          else syncDot('idle');
        });
    }, 600);
  });
}

function dbLoadAll() {
  onSupaReady(function() {
    supa.from('grid_users').select('*').then(function(res) {
      if (res.error || !res.data || !res.data.length) return;
      res.data.forEach(function(row) {
        var existing = state.users.find(function(u){ return u.id===row.id; });
        if (existing) {
          existing.images = row.images || [];
          existing.name   = row.name;
          existing.color  = row.color;
          LS.saveImgs(row.id, existing.images);
        } else {
          state.users.push({id:row.id, name:row.name, color:row.color, images:row.images||[]});
          LS.saveImgs(row.id, row.images||[]);
        }
      });
      LS.save();
      render();
    });
  });
}

// Realtime subscription — listen for changes to current user's row
function subscribeRealtime() {
  onSupaReady(function() {
    if (_realtimeCh) { supa.removeChannel(_realtimeCh); _realtimeCh = null; }
    _realtimeCh = supa
      .channel('grid_users_changes')
      .on('postgres_changes',
        { event:'*', schema:'public', table:'grid_users' },
        function(payload) {
          var row = payload.new;
          if (!row || !row.id) return;
          var u = state.users.find(function(u){ return u.id===row.id; });
          if (!u) {
            state.users.push({id:row.id, name:row.name, color:row.color, images:row.images||[]});
            LS.save();
          } else {
            u.images = row.images || [];
            u.name   = row.name;
            u.color  = row.color;
            LS.saveImgs(row.id, u.images);
          }
          if (row.id === state.currentUser) { renderGrid(); renderHeader(); }
        }
      )
      .subscribe();
  });
}

function initSupabaseSync() {
  dbLoadAll();
  subscribeRealtime();
}

// ══════════════════════════════════════
// SUPABASE STORAGE — bucket: grid-ig
// ══════════════════════════════════════
function uploadToStorage(userId, file, onDone, onError) {
  onSupaReady(function() {
    resizeImage(file, 1080, function(blob) {
      var filename = userId+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,6)+'.jpg';
      supa.storage.from(BUCKET)
        .upload(filename, blob, { contentType:'image/jpeg', upsert:false })
        .then(function(res) {
          if (res.error) { onError(res.error); return; }
          var pub = supa.storage.from(BUCKET).getPublicUrl(filename);
          onDone(pub.data.publicUrl);
        });
    });
  });
}

function deleteFromStorage(url) {
  if (!url || !supa) return;
  // Extract path from public URL: .../storage/v1/object/public/grid-ig/PATH
  try {
    var marker = '/object/public/'+BUCKET+'/';
    var idx = url.indexOf(marker);
    if (idx === -1) return;
    var path = url.slice(idx + marker.length);
    supa.storage.from(BUCKET).remove([path]).catch(function(){});
  } catch(e) {}
}

function resizeImage(file, maxSize, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w=img.width, h=img.height;
      if (w>maxSize||h>maxSize) {
        var r=Math.min(maxSize/w,maxSize/h);
        w=Math.round(w*r); h=Math.round(h*r);
      }
      var c=document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(function(blob){ cb(blob); },'image/jpeg',0.85);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() { renderHeader(); renderGrid(); renderModeUI(); }

function renderHeader() {
  var u = cur();
  var name = u ? u.name : '—';
  document.getElementById('header-name').textContent = '@'+name;
  var av = document.getElementById('header-avatar');
  av.textContent = name[0].toUpperCase();
  av.style.background = u ? u.color : '#999';
  document.getElementById('photo-count').textContent = (u?u.images.length:0)+' foto';
}

function renderGrid() {
  var u = cur(); if (!u) return;
  var imgs = u.images;
  var grid = document.getElementById('grid');
  var total = Math.max(12, Math.ceil((imgs.length+1)/COLS)*COLS);
  if (grid.children.length !== total) {
    grid.innerHTML = '';
    for (var i=0;i<total;i++) grid.appendChild(buildCell(i));
  } else {
    for (var i=0;i<total;i++) refreshCell(grid.children[i], i);
  }
}

function buildCell(vi) {
  var el = document.createElement('div');
  el.dataset.vi = vi;
  fillCell(el, vi);
  attachEvents(el, vi);
  return el;
}

function refreshCell(el, vi) {
  var clone = el.cloneNode(false);
  clone.dataset.vi = vi;
  fillCell(clone, vi);
  attachEvents(clone, vi);
  el.parentNode.replaceChild(clone, el);
}

function fillCell(el, vi) {
  var u = cur();
  var imgs = u ? u.images : [];
  var img = imgs[vi] || null;
  if (!img) {
    el.className = 'grid-cell';
    el.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">'
      +'<span style="font-family:\'Cormorant Garamond\',serif;font-size:11px;color:var(--text3);opacity:.35;">'+(vi+1)+'</span>'
      +'</div>';
    return;
  }
  el.className = 'grid-cell has-img';
  el.innerHTML =
    '<span class="cell-pos">'+(vi+1)+'</span>'
    +'<img class="cell-img" src="'+img+'" draggable="false" loading="lazy">'
    +'<div class="cell-overlay">'
      +'<button class="cell-btn del" data-act="del" data-di="'+vi+'">✕</button>'
      +'<button class="cell-btn" data-act="rep" data-di="'+vi+'">↺</button>'
    +'</div>';
}

// ══════════════════════════════════════
// CELL EVENTS
// ══════════════════════════════════════
function attachEvents(el, vi) {
  el.onclick = function(e) {
    var btn = e.target.closest('[data-act]');
    if (btn) {
      var di = parseInt(btn.dataset.di);
      if (btn.dataset.act==='del') { deleteImage(di); return; }
      if (btn.dataset.act==='rep') { replaceImage(di); return; }
    }
    handleTap(vi);
  };
  el.draggable = true;
  el.addEventListener('dragstart', function(e) {
    if (state.mode!=='rearrange') { e.preventDefault(); return; }
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', String(vi));
  });
  el.addEventListener('dragend', function(){ el.classList.remove('dragging'); });
  el.addEventListener('dragover', function(e) {
    if (state.mode!=='rearrange') return;
    e.preventDefault(); el.classList.add('drag-over');
  });
  el.addEventListener('dragleave', function(){ el.classList.remove('drag-over'); });
  el.addEventListener('drop', function(e) {
    e.preventDefault(); el.classList.remove('drag-over');
    if (state.mode!=='rearrange') return;
    var src = parseInt(e.dataTransfer.getData('text/plain'));
    if (src!==vi) doSwap(src, vi);
  });
  var tm = {moved:false, src:0};
  el.addEventListener('touchstart', function(){ tm.moved=false; tm.src=vi; }, {passive:true});
  el.addEventListener('touchmove', function(e) {
    if (state.mode!=='rearrange') return;
    e.preventDefault(); tm.moved=true;
    var t=e.touches[0];
    document.querySelectorAll('.grid-cell').forEach(function(c){c.classList.remove('drag-over');});
    var tc=document.elementFromPoint(t.clientX,t.clientY);
    var cell=tc&&tc.closest('.grid-cell');
    if(cell&&parseInt(cell.dataset.vi)!==tm.src) cell.classList.add('drag-over');
    el.classList.add('dragging');
  }, {passive:false});
  el.addEventListener('touchend', function(e) {
    if (state.mode!=='rearrange') return;
    el.classList.remove('dragging');
    document.querySelectorAll('.grid-cell').forEach(function(c){c.classList.remove('drag-over');});
    if (!tm.moved) return;
    var t=e.changedTouches[0];
    var tc=document.elementFromPoint(t.clientX,t.clientY);
    var cell=tc&&tc.closest('.grid-cell');
    if(cell){ var dst=parseInt(cell.dataset.vi); if(dst!==tm.src) doSwap(tm.src,dst); }
    tm.moved=false;
  }, {passive:true});
}

function handleTap(vi) {
  var u=cur(); if(!u) return;
  var hasImg=!!u.images[vi];
  if (state.mode==='delete') { if(hasImg) deleteImage(vi); return; }
  if (state.mode==='swap') {
    if(!hasImg) return;
    if(state.swapSource===null) {
      state.swapSource=vi;
      var el=document.querySelector('[data-vi="'+vi+'"]');
      if(el) el.classList.add('swap-source');
    } else if(state.swapSource===vi) {
      var el=document.querySelector('[data-vi="'+vi+'"]');
      if(el) el.classList.remove('swap-source');
      state.swapSource=null;
    } else {
      doSwap(state.swapSource,vi);
      document.querySelectorAll('.grid-cell').forEach(function(c){c.classList.remove('swap-source','swap-target');});
      state.swapSource=null;
    }
    updateSwapHint();
  }
}

// ══════════════════════════════════════
// IMAGE OPS
// ══════════════════════════════════════
function doSwap(a, b) {
  var u=cur(); if(!u) return;
  var tmp=u.images[a];
  if(u.images[b]!==undefined) u.images[a]=u.images[b]; else u.images.splice(a,1,undefined);
  if(tmp!==undefined) u.images[b]=tmp; else delete u.images[b];
  while(u.images.length&&u.images[u.images.length-1]===undefined) u.images.length--;
  afterImagesChanged(u);
  renderGrid(); renderHeader();
  showToast('✓ Posisi ditukar');
}

function deleteImage(di) {
  var u=cur(); if(!u) return;
  var url=u.images[di];
  if(url) deleteFromStorage(url);
  u.images.splice(di,1);
  afterImagesChanged(u);
  renderGrid(); renderHeader();
  showToast('Foto dihapus');
}

function afterImagesChanged(u) {
  LS.saveImgs(u.id, u.images);
  dbSaveUser(u);
}

var _pendingReplace = null;

function replaceImage(di) {
  _pendingReplace=di;
  var fi=document.getElementById('file-input');
  fi.multiple=false; fi.value=''; fi.click();
}

function triggerUpload() {
  _pendingReplace=null;
  var fi=document.getElementById('file-input');
  fi.multiple=true; fi.value=''; fi.click();
}

document.getElementById('upload-btn').addEventListener('click', triggerUpload);

document.getElementById('file-input').addEventListener('change', function(e) {
  var files=Array.from(e.target.files);
  if(!files.length) return;
  var u=cur(); if(!u) return;

  if (_pendingReplace !== null) {
    var di=_pendingReplace; _pendingReplace=null;
    var oldUrl=u.images[di];
    showToast('Mengupload…');
    syncDot('syncing');
    uploadToStorage(u.id, files[0],
      function(url) {
        if(oldUrl) deleteFromStorage(oldUrl);
        u.images[di]=url;
        afterImagesChanged(u);
        renderGrid(); renderHeader();
        showToast('✓ Foto diganti');
      },
      function(err) { syncDot('error'); showToast('Upload gagal: '+err.message); }
    );
    return;
  }

  var total=files.length, done=0, results=new Array(total);
  showToast('Mengupload '+total+' foto…');
  syncDot('syncing');

  files.forEach(function(file, fi) {
    uploadToStorage(u.id, file,
      function(url) {
        results[fi]=url; done++;
        if(done===total) {
          u.images=results.filter(Boolean).concat(u.images);
          afterImagesChanged(u);
          renderGrid(); renderHeader();
          showToast('✓ '+total+' foto ditambahkan');
        }
      },
      function(err) {
        done++;
        syncDot('error');
        showToast('Upload gagal: '+err.message);
      }
    );
  });
});

// ══════════════════════════════════════
// MODE
// ══════════════════════════════════════
function setMode(m) {
  state.mode=m; state.swapSource=null;
  document.querySelectorAll('.grid-cell').forEach(function(c){
    c.classList.remove('swap-source','swap-target','dragging','drag-over');
  });
  renderModeUI();
}

function renderModeUI() {
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.mode===state.mode);
  });
  updateSwapHint();
}

function updateSwapHint() {
  var h=document.getElementById('swap-hint');
  if(state.mode==='swap') {
    h.textContent=state.swapSource===null?'Tap foto pertama yang mau di-swap':'Tap foto kedua untuk tukar posisi ✓';
  } else { h.textContent=''; }
}

document.querySelectorAll('.mode-btn').forEach(function(b){
  b.addEventListener('click', function(){ setMode(b.dataset.mode); });
});

// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
document.getElementById('theme-btn').addEventListener('click', function() {
  state.theme=state.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  this.textContent=state.theme==='dark'?'☾':'☀';
  LS.save();
});

// ══════════════════════════════════════
// USER MODAL
// ══════════════════════════════════════
function openUserModal() { renderUserModal(); document.getElementById('user-modal').classList.add('open'); }
function closeUserModal() { document.getElementById('user-modal').classList.remove('open'); }
document.getElementById('user-modal').addEventListener('click', function(e){
  if(e.target===this) closeUserModal();
});

function renderUserModal() {
  var list=document.getElementById('user-list');
  list.innerHTML='';
  state.users.forEach(function(u) {
    var el=document.createElement('div');
    el.className='user-item'+(u.id===state.currentUser?' active':'');
    el.innerHTML=
      '<div class="user-item-avatar" style="background:'+u.color+'">'+u.name[0].toUpperCase()+'</div>'
      +'<div class="user-item-info">'
        +'<div class="user-item-name">@'+u.name+'</div>'
        +'<div class="user-item-sub">'+u.images.length+' foto</div>'
      +'</div>'
      +(u.id===state.currentUser?'<span class="user-item-check">✓</span>':'')
      +(state.users.length>1?'<button class="cell-btn del" style="flex-shrink:0;background:rgba(192,57,43,0.12);color:#c0392b;width:28px;height:28px;" data-del="'+u.id+'">✕</button>':'');
    el.addEventListener('click', function(e){
      var d=e.target.closest('[data-del]');
      if(d){ delUser(d.dataset.del); return; }
      switchUser(u.id);
    });
    list.appendChild(el);
  });
  var cr=document.getElementById('color-row');
  cr.innerHTML='';
  COLORS.forEach(function(c){
    var s=document.createElement('div');
    s.className='color-swatch'+(c===state.selectedColor?' selected':'');
    s.style.background=c;
    s.onclick=function(){
      state.selectedColor=c;
      document.querySelectorAll('.color-swatch').forEach(function(x){x.classList.remove('selected');});
      s.classList.add('selected');
    };
    cr.appendChild(s);
  });
}

function switchUser(id) {
  state.currentUser=id; state.swapSource=null;
  LS.save(); render(); closeUserModal();
  showToast('Switched to @'+cur().name);
}

function addUser() {
  var inp=document.getElementById('new-username');
  var name=inp.value.replace('@','').trim();
  if(!name){ showToast('Isi username dulu'); return; }
  if(state.users.find(function(u){ return u.name.toLowerCase()===name.toLowerCase(); })){ showToast('Username sudah ada'); return; }
  var u=makeUser(name);
  dbSaveUser(u);
  LS.save(); inp.value='';
  switchUser(u.id); renderUserModal();
}

function delUser(id) {
  if(state.users.length<=1) return;
  if(!confirm('Hapus profil ini?')) return;
  state.users=state.users.filter(function(u){ return u.id!==id; });
  try{ localStorage.removeItem('gig_sb_imgs_'+id); }catch(e){}
  onSupaReady(function(){
    supa.from('grid_users').delete().eq('id',id).catch(function(){});
  });
  if(state.currentUser===id) state.currentUser=state.users[0].id;
  LS.save(); renderUserModal(); render();
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}
